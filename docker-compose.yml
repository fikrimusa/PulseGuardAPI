version: "2.4"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__PulseGuardDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-pulseguard};Username=${POSTGRES_USER:-pulseguard};Password=${POSTGRES_PASSWORD:-pulseguard_dev_password}
      Jwt__Key: ${JWT_KEY:-PulseGuardDockerDevelopmentOnlyKeyChangeBeforeProduction123!}
      Jwt__Issuer: ${JWT_ISSUER:-PulseGuard.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-PulseGuard.Api.Client}
      HealthCheckWorker__PollingIntervalSeconds: ${HEALTH_CHECK_WORKER_POLLING_INTERVAL_SECONDS:-10}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulseguard}
      POSTGRES_USER: ${POSTGRES_USER:-pulseguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulseguard_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pulseguard-postgres-data:/var/lib/postgresql/data

volumes:
  pulseguard-postgres-data:
