name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-and-containerize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore PulseGuard.sln

      - name: Build solution
        run: dotnet build PulseGuard.sln --configuration Release --no-restore

      - name: Run automated tests
        run: dotnet test PulseGuard.sln --configuration Release --no-build --verbosity normal

      - name: Verify Docker image build
        run: docker build --tag pulseguard-api:ci .
